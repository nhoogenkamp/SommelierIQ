<!DOCTYPE html>
<html>

<head>
    <title>Register Admin</title>
    <link rel="stylesheet" href="../css/navbar.css">
</head>

<body>
<div id="navbar"></div>
<br>
<!-- Using a form to register: https://www.w3schools.com/howto/tryit.asp?filename=tryhow_css_register_form --> 
<form id="registerForm">

    <div class="container">

        <h1>Register Admin</h1>
        <p>Please fill in this form to create an admin account.</p>
        <hr>

        <label for="restaurant_id"><b>Restaurant ID</b></label>
        <input type="number" placeholder="Enter Restaurant ID" id="restaurant_id" required>

        <label for="username"><b>Username</b></label>
        <input type="text" placeholder="Enter Username" id="username" required>

        <label for="password"><b>Password</b> </label> 
        <input type="password" placeholder="Enter Password" id="password" required>
        <hr>

        <button type="button" class="registerbtn" onclick="register_admin()">
            Register
        </button>

        <p id="message"></p>

    </div>

</form>
<script src="../javascript/register.js"></script>
<script src="../javascript/validation.js"></script>
<script src="../javascript/navbar.js"></script>
<script src="../javascript/logout.js"></script>
<link rel="stylesheet" href="../css/style.css">
</body>

</html>
