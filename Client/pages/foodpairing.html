<!DOCTYPE html>
<html>

<head>
    <title>Food Pairing</title>
</head>

<body>
<div id="navbar"></div>
<!-- Dishcounts to determine how many dishes you can put in -->   
<label for="dishCount">How Many Dishes would you like to use for pairing</label>

<select id="dishCount" onchange="genFields()">
    <option value="0">How many dishes</option>
    <option value="1">1 Dish</option>
    <option value="2">2 Dishes</option>
    <option value="3">3 Dishes</option>
    <option value="4">4 Dishes</option>
    <option value="5">5 Dishes</option>
    <option value="6">6 Dishes</option>
    <option value="7">7 Dishes</option>
    <option value="8">8 Dishes</option>
</select>

<div id="fields"></div>

<!-- Filtering wines based on colour, bottle type or price -->  
<label for="wineColour">Wine Colour:</label>
<select id="wineColour">
    <option value="">All</option>
    <option value="red">Red</option>
    <option value="white">White</option>
    <option value="rose">Rosé</option>
    <option value="non_alcoholic">Non_alcoholic</option>
    <option value="sherry">Sparkling</option>
    <option value="champagne">Champagne</option>
    <option value="dessert">Dessert</option>
    <option value="port">Port</option>
</select>

<label for="bottleType">Bottle Type:</label>
<select id="bottleType">
    <option value="">All</option>
    <option value="Glass">Glass</option>
    <option value="Half Bottle">Half Bottle</option>
    <option value="Bottle">Bottle</option>
    <option value="Magnum">Magnum</option>
    <option value="Jeroboam">Jeroboam</option>
    <option value="Melchior">Melchior</option>
    <option value="Salmanazar">Salmanazar</option>
    <option value="Double Magnum">Double Magnum</option>
    <option value="Imperial">Imperial</option>
</select>

<label for="maxPrice">Max Price:</label>
<select id="maxPrice">
    <option value="">No Limit</option>
    <option value="50">€50</option>
    <option value="75">€75</option>
    <option value="100">€100</option>
    <option value="150">€150</option>
    <option value="200">€200</option>
    <option value="250">€250</option>
    <option value="300">€300</option>
</select>

<!-- Button that sends dish_1 to backend -->
 <button onclick="submit_dish()">Submit</button>

<div id="combined_section" style="display:none;">
    <!-- Results for combined recommendations -->
    <h2>Combined Recommendations</h2>

    <table border="1">

        <thead>
            <tr>
                <th>Year</th>
                <th>Bottle Type</th>
                <th>Name</th>
                <th>Wine Type</th>
                <th>Grape</th>
                <th>Country</th>
                <th>Region</th>
                <th>match_percentage</th>
                <th>Price</th>
            </tr>
        </thead>

        <tbody id="combined_recommendations"></tbody>

    </table>
</div>    
<!-- Results for individual wine dish pairing -->
<h2>Individual Recommendations</h2>
<table border="1">
    <thead>
        <tr>
            <th>Year</th>
            <th>Bottle Type</th>
            <th>Name</th>
            <th>Wine Type</th>
            <th>Grape</th>
            <th>Country</th>
            <th>Region</th>
            <th>match_percentage</th>
            <th>Price</th>
        </tr>
    </thead>

    <tbody id="recommendations"></tbody>
</table>


<script src="../javascript/foodpairing.js"></script>
<script src="../javascript/navbar.js"></script>
</body>

</html>
