<!DOCTYPE html>
<html>

<head>
    <title>Login</title>
    <link rel="stylesheet" href="../css/navbar.css">
</head>

<body>
<div id="navbar"></div>
<br>
<!-- Using a form to login same as register: https://www.w3schools.com/howto/tryit.asp?filename=tryhow_css_register_form --> 
<form id="loginForm">

    <div class="container">

        <h1>Admin Login</h1>
        <p>Please fill username and password.</p>
        <hr>

        <label for="username"><b>Username</b></label>
        <input type="text" placeholder="Enter Username" id="username" required>

        <label for="password"><b>Password</b> </label> 
        <input type="password" placeholder="Enter Password" id="password" required>
        <hr>

        <button type="button" class="registerbtn" onclick="login_admin()">
            Login
        </button>

        <p id="message"></p>

    </div>

</form>
<script src="../javascript/login.js"></script>
<script src="../javascript/navbar.js"></script>
</body>
</html>
