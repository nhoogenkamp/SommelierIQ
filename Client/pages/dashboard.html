<!DOCTYPE html>
<html>

<head>
    <title>Dashboard Page</title>
</head>

<body>
<h1> This is the Dashboard Page </h1>   
<h2> Search for a wine: </h2>    

<form id="Wineform">
    <label for="WineID"><b>WineID</b></label>
    <input type="number" placeholder="Enter wineID" id="wine_id">


    <label for="wineColour">Wine Colour:</label>
    <select id="wineColour">
        <option value="">All</option>
        <option value="red">Red</option>
        <option value="white">White</option>
        <option value="rose">Rosé</option>
        <option value="non_alcoholic">Non_alcoholic</option>
        <option value="sherry">Sparkling</option>
        <option value="champagne">Champagne</option>
        <option value="dessert">Dessert</option>
        <option value="port">Port</option>
    </select>

    <label for="bottleType">Bottle Type:</label>
    <select id="bottleType">
        <option value="">All</option>
        <option value="Glass">Glass</option>
        <option value="Half Bottle">Half Bottle</option>
        <option value="Bottle">Bottle</option>
        <option value="Magnum">Magnum</option>
        <option value="Jeroboam">Jeroboam</option>
        <option value="Melchior">Melchior</option>
        <option value="Salmanazar">Salmanazar</option>
        <option value="Double Magnum">Double Magnum</option>
        <option value="Imperial">Imperial</option>
    </select>

    <label for="maxPrice">Max Price:</label>
    <select id="maxPrice">
        <option value="">No Limit</option>
        <option value="50">€50</option>
        <option value="75">€75</option>
        <option value="100">€100</option>
        <option value="150">€150</option>
        <option value="200">€200</option>
        <option value="250">€250</option>
        <option value="300">€300</option>
    </select>
</form>
<button onclick="getWines()">Load Wines</button>

<button onclick="closeWines()"> Close Wines </button>

<div id="wineSection" style="display:none;">
    <table border="1">
        <thead>
            <tr>
                <th>WineID</th>
                <th>Year</th>
                <th>Bottle Type</th>
                <th>Name</th>
                <th>Wine Type</th>
                <th>Grape</th>
                <th>Country</th>
                <th>Region</th>
                <th>Price</th>
                <th>body_score</th>
                <th>tannin_score</th>
                <th>acidity_score</th>
                <th>sweetness_score</th>
                <th>description</th>
            </tr>
        </thead>

        <tbody id="wines"></tbody>
    </table>
</div>
    <script src="../javascript/dashboard.js"></script>

</body>

</html>
